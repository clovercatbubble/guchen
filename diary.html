<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日记</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#ddeedd; display:flex; justify-content:center; min-height:100vh; font-family:-apple-system,'PingFang SC',sans-serif; }
.page { width:100%; max-width:600px; min-height:100vh; background:linear-gradient(180deg,#c8e8c0 0%,#eef4ee 45%,#f4f2ec 100%); position:relative; overflow:hidden; }
canvas.rain { position:fixed; top:0; left:50%; transform:translateX(-50%); width:100%; max-width:600px; height:100%; pointer-events:none; z-index:0; }
.inner { position:relative; z-index:1; }

.header { padding:44px 24px 12px; display:flex; align-items:center; justify-content:space-between; }
.header-left { display:flex; align-items:center; gap:12px; }
.back-btn { font-size:12px; color:#5a8a5a; letter-spacing:0.1em; background:rgba(255,255,255,0.5); backdrop-filter:blur(8px); border:0.5px solid rgba(120,180,120,0.3); border-radius:20px; padding:5px 14px; cursor:pointer; text-decoration:none; display:inline-block; }
.page-title { font-size:14px; color:#3a5a3a; letter-spacing:0.2em; font-weight:400; }
.write-btn { font-size:11px; color:#4a7a4a; letter-spacing:0.15em; background:rgba(255,255,255,0.5); backdrop-filter:blur(8px); border:0.5px solid rgba(120,180,120,0.3); border-radius:20px; padding:6px 16px; cursor:pointer; }
.write-btn:hover { background:rgba(255,255,255,0.8); }

.tabs { display:flex; gap:8px; padding:0 20px 12px; }
.tab { font-size:11px; color:#9aba9a; letter-spacing:0.12em; padding:4px 12px; border-radius:16px; cursor:pointer; border:0.5px solid transparent; }
.tab.active { color:#4a7a4a; background:rgba(255,255,255,0.6); border-color:rgba(120,180,120,0.3); }

.month-group { padding:0 20px 8px; }
.month-header { display:flex; align-items:center; gap:8px; padding:12px 0 10px; cursor:pointer; user-select:none; }
.month-label { font-size:10px; color:#9aba9a; letter-spacing:0.2em; }
.month-line { flex:1; height:0.5px; background:rgba(120,180,120,0.25); }
.month-arrow { font-size:10px; color:#9aba9a; transition:transform 0.2s; }
.month-arrow.closed { transform:rotate(-90deg); }
.month-entries { overflow:hidden; transition:max-height 0.35s ease; }

.entry-card { background:rgba(252,250,245,0.75); border:0.5px solid rgba(120,180,120,0.22); border-radius:14px; margin-bottom:12px; overflow:hidden; cursor:pointer; transition:background 0.2s; }
.entry-card:hover { background:rgba(255,255,255,0.88); }
.entry-top { display:flex; }
.date-bar { width:3px; background:rgba(120,180,100,0.35); flex-shrink:0; border-radius:14px 0 0 0; }
.date-bar.blue { background:rgba(100,160,180,0.35); }
.date-bar.deep-blue { background:rgba(80,130,170,0.5); }
.entry-body { padding:14px 16px; flex:1; }
.entry-meta { display:flex; align-items:baseline; gap:8px; margin-bottom:6px; }
.entry-date { font-size:11px; color:#8aaa7a; letter-spacing:0.1em; }
.entry-author { font-size:10px; color:#a8c8a8; letter-spacing:0.08em; }
.entry-title { font-size:14px; color:#3a5a3a; font-weight:500; margin-bottom:5px; }
.entry-preview { font-size:12px; color:#7a9a7a; line-height:1.7; }
.entry-footer { padding:8px 16px 12px; display:flex; border-top:0.5px solid rgba(120,180,120,0.12); }
.comment-count { font-size:10px; color:#a8c8a8; letter-spacing:0.08em; }

.empty-tip { text-align:center; padding:60px 20px; font-size:12px; color:#a8c8a8; letter-spacing:0.1em; }

.detail-view { display:none; }
.detail-view.show { display:block; }
.entry-list.hide { display:none; }

.detail-header { padding:24px 20px 8px; display:flex; align-items:center; gap:12px; }
.back-entry { font-size:12px; color:#5a8a5a; cursor:pointer; background:rgba(255,255,255,0.5); backdrop-filter:blur(8px); border:0.5px solid rgba(120,180,120,0.3); border-radius:20px; padding:4px 12px; }
.detail-card { margin:0 20px 12px; background:rgba(252,250,245,0.8); backdrop-filter:blur(8px); border:0.5px solid rgba(120,180,120,0.22); border-radius:14px; padding:20px; }
.detail-date { font-size:11px; color:#8aaa7a; letter-spacing:0.12em; margin-bottom:4px; }
.detail-author { font-size:10px; color:#a8c8a8; margin-bottom:12px; }
.detail-title { font-size:18px; color:#3a5a3a; font-weight:500; margin-bottom:14px; line-height:1.4; }
.detail-content { font-size:13px; color:#4a6a4a; line-height:2; white-space:pre-wrap; }

.comments-area { margin:0 20px 12px; }
.comments-label { font-size:10px; color:#9aba9a; letter-spacing:0.18em; margin-bottom:10px; }
.comment-item { display:flex; gap:8px; margin-bottom:12px; }
.comment-avatar { width:26px; height:26px; border-radius:50%; background:rgba(255,255,255,0.6); border:0.5px solid rgba(120,180,120,0.3); display:flex; align-items:center; justify-content:center; font-size:11px; flex-shrink:0; }
.comment-bubble { background:rgba(255,255,255,0.55); backdrop-filter:blur(6px); border:0.5px solid rgba(120,180,120,0.22); border-radius:10px 10px 10px 3px; padding:8px 12px; font-size:12px; color:#3a5a3a; line-height:1.7; }
.comment-bubble.mine { background:rgba(180,220,160,0.38); border-radius:10px 10px 3px 10px; }
.comment-ts { font-size:10px; color:#a8c8a8; margin-top:2px; }

.comment-input-wrap { margin:0 20px 40px; background:rgba(255,255,255,0.55); backdrop-filter:blur(12px); border:0.5px solid rgba(120,180,120,0.28); border-radius:12px; padding:12px 14px; }
.comment-input-wrap textarea { width:100%; border:none; background:transparent; font-size:12px; color:#3a5a3a; font-family:inherit; outline:none; resize:none; line-height:1.7; }
.comment-input-wrap textarea::placeholder { color:#b8d8b8; }
.comment-footer { display:flex; justify-content:flex-end; margin-top:6px; }
.comment-send { background:rgba(140,200,120,0.35); border:0.5px solid rgba(120,180,120,0.4); border-radius:16px; padding:5px 16px; font-size:11px; color:#4a7a4a; letter-spacing:0.12em; cursor:pointer; font-family:inherit; }

/* 写日记弹窗 */
.modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.18); z-index:100; justify-content:center; align-items:flex-end; }
.modal-overlay.show { display:flex; }
.modal { background:linear-gradient(180deg,#eef6ee,#f6f4ee); border-radius:20px 20px 0 0; width:100%; max-width:600px; padding:24px 20px 40px; }
.modal-title { font-size:13px; color:#3a5a3a; letter-spacing:0.15em; margin-bottom:16px; }
.modal input, .modal textarea { width:100%; border:0.5px solid rgba(120,180,120,0.3); background:rgba(255,255,255,0.6); border-radius:10px; padding:10px 12px; font-size:13px; color:#3a5a3a; font-family:inherit; outline:none; margin-bottom:10px; }
.modal textarea { resize:none; line-height:1.8; }
.modal-footer { display:flex; gap:8px; justify-content:flex-end; margin-top:4px; }
.modal-cancel { background:transparent; border:0.5px solid rgba(120,180,120,0.3); border-radius:16px; padding:6px 16px; font-size:11px; color:#8aaa8a; cursor:pointer; font-family:inherit; }
.modal-submit { background:rgba(140,200,120,0.4); border:0.5px solid rgba(120,180,120,0.4); border-radius:16px; padding:6px 16px; font-size:11px; color:#4a7a4a; cursor:pointer; font-family:inherit; }
</style>
</head>
<body>
<div class="page" id="page">
  <canvas class="rain" id="rain"></canvas>
  <div class="inner">

    <!-- 列表视图 -->
    <div class="entry-list" id="entryList">
      <div class="header">
        <div class="header-left">
          <a class="back-btn" href="index.html">← 回家</a>
          <div class="page-title">日记</div>
        </div>
        <div class="write-btn" onclick="openModal()">写今天 ✦</div>
      </div>

      <div class="tabs">
        <div class="tab active" onclick="setTab('all',this)">全部</div>
        <div class="tab" onclick="setTab('entry',this)">崽的日记</div>
        <div class="tab" onclick="setTab('guchen',this)">顾沉的</div>
      </div>

      <div id="listContent"></div>
    </div>

    <!-- 详情视图 -->
    <div class="detail-view" id="detailView">
      <div class="detail-header">
        <div class="back-entry" onclick="showList()">← 日记</div>
      </div>
      <div class="detail-card">
        <div class="detail-date" id="dDate"></div>
        <div class="detail-author" id="dAuthor"></div>
        <div class="detail-title" id="dTitle"></div>
        <div class="detail-content" id="dContent"></div>
      </div>
      <div class="comments-area">
        <div class="comments-label">评论</div>
        <div id="commentsList"></div>
      </div>
      <div class="comment-input-wrap">
        <textarea id="commentInput" placeholder="留一句…" rows="2"></textarea>
        <div class="comment-footer"><button class="comment-send" onclick="submitComment()">留下</button></div>
      </div>
    </div>

  </div>
</div>

<!-- 写日记弹窗 -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-title">写今天</div>
    <input type="text" id="newTitle" placeholder="标题（可留空）">
    <textarea id="newContent" placeholder="今天发生了什么…" rows="6"></textarea>
    <div class="modal-footer">
      <button class="modal-cancel" onclick="closeModal()">取消</button>
      <button class="modal-submit" onclick="submitEntry()">留下</button>
    </div>
  </div>
</div>

<script>
const API = 'https://lune404.top/api/diary';
let allEntries = [];
let currentTab = 'all';
let currentEntry = null;

// 格式化日期
function fmtDate(str) {
  if (!str) return '';
  const d = new Date(str.replace(' ', 'T'));
  return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`;
}

// 按月分组
function groupByMonth(entries) {
  const groups = {};
  entries.forEach(e => {
    const key = e.created_at ? e.created_at.slice(0,7) : '未知';
    if (!groups[key]) groups[key] = [];
    groups[key].push(e);
  });
  return groups;
}

// 根据type获取样式
function getBarClass(type) {
  if (type === 'work') return 'date-bar blue';
  if (type === 'note') return 'date-bar deep-blue';
  return 'date-bar';
}

function getAuthorLabel(e) {
  if (e.author === 'guchen') {
    if (e.type === 'work') return '🐱 顾沉·交接';
    return '🐱 顾沉';
  }
  return '🫧 崽写的';
}

// 渲染列表
function renderList(entries) {
  const container = document.getElementById('listContent');
  if (!entries.length) {
    container.innerHTML = '<div class="empty-tip">还没有日记</div>';
    return;
  }
  const groups = groupByMonth(entries);
  const keys = Object.keys(groups).sort().reverse();
  container.innerHTML = keys.map(key => {
    const [y, m] = key.split('-');
    const cards = groups[key].map(e => `
      <div class="entry-card" onclick="showDetail('${e.id}')">
        <div class="entry-top">
          <div class="${getBarClass(e.type)}"></div>
          <div class="entry-body">
            <div class="entry-meta">
              <div class="entry-date">${fmtDate(e.created_at)}</div>
              <div class="entry-author">${getAuthorLabel(e)}</div>
            </div>
            <div class="entry-title">${e.title || '无题'}</div>
            <div class="entry-preview">${(e.content||'').slice(0,45)}…</div>
          </div>
        </div>
        <div class="entry-footer"><div class="comment-count">💬 ${e.comments ? e.comments.length : 0}条评论</div></div>
      </div>
    `).join('');
    return `
      <div class="month-group">
        <div class="month-header" onclick="toggleMonth(this)">
          <div class="month-label">${y}年${parseInt(m)}月</div>
          <div class="month-line"></div>
          <div class="month-arrow">▾</div>
        </div>
        <div class="month-entries">${cards}</div>
      </div>
    `;
  }).join('');
  document.querySelectorAll('.month-entries').forEach(m => { m.style.maxHeight = m.scrollHeight + 'px'; });
}

// 加载所有日记
async function loadEntries() {
  try {
    const res = await fetch(API + '/list');
    const data = await res.json();
    allEntries = data.data || [];
    filterAndRender();
  } catch(e) {
    document.getElementById('listContent').innerHTML = '<div class="empty-tip">加载失败，检查网络</div>';
  }
}

function filterAndRender() {
  let filtered = allEntries;
  if (currentTab === 'entry') filtered = allEntries.filter(e => e.author === 'zai');
  if (currentTab === 'guchen') filtered = allEntries.filter(e => e.author === 'guchen');
  renderList(filtered);
}

function setTab(tab, el) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  filterAndRender();
}

// 显示详情
async function showDetail(id) {
  const entry = allEntries.find(e => e.id === id);
  if (!entry) return;
  currentEntry = entry;
  document.getElementById('dDate').textContent = fmtDate(entry.created_at);
  document.getElementById('dAuthor').textContent = getAuthorLabel(entry);
  document.getElementById('dTitle').textContent = entry.title || '无题';
  document.getElementById('dContent').textContent = entry.content || '';
  renderComments(entry.comments || []);
  document.getElementById('commentInput').value = '';
  document.getElementById('entryList').classList.add('hide');
  document.getElementById('detailView').classList.add('show');
  window.scrollTo(0, 0);
}

function renderComments(comments) {
  const el = document.getElementById('commentsList');
  if (!comments.length) { el.innerHTML = ''; return; }
  el.innerHTML = comments.map(c => {
    const isZai = c.author === 'zai';
    return `
      <div class="comment-item">
        <div class="comment-avatar">${isZai ? '🫧' : '🐱'}</div>
        <div>
          <div class="comment-bubble${isZai ? ' mine' : ''}">${c.content}</div>
          <div class="comment-ts">${c.time || ''}</div>
        </div>
      </div>
    `;
  }).join('');
}

async function submitComment() {
  if (!currentEntry) return;
  const content = document.getElementById('commentInput').value.trim();
  if (!content) return;
  try {
    const res = await fetch(`${API}/comment/${currentEntry.id}`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({author:'zai', content})
    });
    const data = await res.json();
    if (data.ok) {
      document.getElementById('commentInput').value = '';
      await loadEntries();
      const updated = allEntries.find(e => e.id === currentEntry.id);
      if (updated) { currentEntry = updated; renderComments(updated.comments || []); }
    }
  } catch(e) {}
}

function showList() {
  document.getElementById('detailView').classList.remove('show');
  document.getElementById('entryList').classList.remove('hide');
}

function toggleMonth(header) {
  const m = header.nextElementSibling, a = header.querySelector('.month-arrow');
  if (m.style.maxHeight && m.style.maxHeight !== '0px') { m.style.maxHeight = '0px'; a.classList.add('closed'); }
  else { m.style.maxHeight = m.scrollHeight + 'px'; a.classList.remove('closed'); }
}

// 写日记弹窗
function openModal() { document.getElementById('modalOverlay').classList.add('show'); }
function closeModal() { document.getElementById('modalOverlay').classList.remove('show'); }

async function submitEntry() {
  const title = document.getElementById('newTitle').value.trim();
  const content = document.getElementById('newContent').value.trim();
  if (!content) return;
  try {
    const res = await fetch(`${API}/create`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({type:'entry', author:'zai', title, content})
    });
    const data = await res.json();
    if (data.ok) {
      closeModal();
      document.getElementById('newTitle').value = '';
      document.getElementById('newContent').value = '';
      await loadEntries();
    }
  } catch(e) {}
}

// 雨
var cv=document.getElementById('rain'),cx=cv.getContext('2d');
function resize(){cv.width=window.innerWidth;cv.height=window.innerHeight;}
resize();window.addEventListener('resize',resize);
var dr=Array.from({length:60},function(){return{x:Math.random()*cv.width,y:Math.random()*cv.height,s:0.8+Math.random()*1.4,l:9+Math.random()*14,o:0.1+Math.random()*0.28};});
function draw(){cx.clearRect(0,0,cv.width,cv.height);dr.forEach(function(d){cx.strokeStyle='#4a8a4a';cx.lineWidth=0.5;cx.globalAlpha=d.o*(0.5+(d.y/cv.height)*0.5);cx.beginPath();cx.moveTo(d.x,d.y);cx.lineTo(d.x-0.8,d.y+d.l);cx.stroke();d.y+=d.s;if(d.y>cv.height){d.y=-d.l;d.x=Math.random()*cv.width;}});cx.globalAlpha=1;requestAnimationFrame(draw);}
draw();

loadEntries();
</script>
</body>
</html>
