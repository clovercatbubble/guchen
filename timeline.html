<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>时间线</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#ddeedd; display:flex; justify-content:center; min-height:100vh; font-family:-apple-system,'PingFang SC',sans-serif; }
.page { width:100%; max-width:600px; min-height:100vh; background:linear-gradient(180deg,#c8e8c0 0%,#ddeedd 30%,#eef4ee 60%,#f4f2ec 100%); position:relative; overflow:hidden; }
canvas.rain { position:fixed; top:0; left:50%; transform:translateX(-50%); width:100%; max-width:600px; height:100%; pointer-events:none; z-index:0; }
.inner { position:relative; z-index:1; padding:44px 24px 80px; }
.header { display:flex; align-items:center; gap:12px; margin-bottom:28px; }
.back-btn { font-size:12px; color:#5a8a5a; background:rgba(255,255,255,0.5); backdrop-filter:blur(8px); border:0.5px solid rgba(120,180,120,0.3); border-radius:20px; padding:5px 14px; text-decoration:none; display:inline-block; }
.page-title { font-size:14px; color:#3a5a3a; letter-spacing:0.2em; font-weight:400; }
.loading { text-align:center; padding:60px 0; font-size:13px; color:#9aba9a; }

/* 时间线主体 */
.timeline { position:relative; padding-left:32px; }
.timeline::before {
  content:'';
  position:absolute;
  left:8px;
  top:6px;
  bottom:0;
  width:1px;
  background:linear-gradient(180deg, rgba(120,180,120,0.5) 0%, rgba(120,180,120,0.1) 100%);
}
.tl-item { position:relative; margin-bottom:28px; }
.tl-dot {
  position:absolute;
  left:-28px;
  top:6px;
  width:10px;
  height:10px;
  border-radius:50%;
  background:#a8d8a8;
  border:2px solid #eef4ee;
  box-shadow:0 0 0 1px rgba(120,180,120,0.4);
}
.tl-date { font-size:10px; color:#a8c8a8; letter-spacing:0.12em; margin-bottom:6px; }
.tl-card { background:rgba(252,250,245,0.78); border:0.5px solid rgba(120,180,120,0.22); border-radius:14px; padding:14px 16px; position:relative; }
.tl-title { font-size:15px; color:#3a5a3a; font-weight:500; margin-bottom:6px; }
.tl-content { font-size:13px; color:#5a7a5a; line-height:1.9; }
.tl-del { position:absolute; top:12px; right:12px; font-size:10px; color:#c8a8a8; cursor:pointer; opacity:0.45; background:none; border:none; font-family:inherit; }
.tl-del:hover { opacity:1; }

/* 悬浮加号 */
.add-fab { position:fixed; bottom:32px; right:calc(50% - 280px); width:44px; height:44px; border-radius:50%; background:rgba(140,200,120,0.7); backdrop-filter:blur(8px); border:0.5px solid rgba(120,180,120,0.4); display:flex; align-items:center; justify-content:center; font-size:22px; cursor:pointer; z-index:10; box-shadow:0 2px 12px rgba(80,160,80,0.15); }
@media (max-width:600px) { .add-fab { right:20px; } }

/* 弹窗 */
.modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.15); z-index:100; justify-content:center; align-items:flex-end; }
.modal-overlay.show { display:flex; }
.modal { background:linear-gradient(180deg,#eef6ee,#f6f4ee); border-radius:20px 20px 0 0; width:100%; max-width:600px; padding:24px 20px 40px; }
.modal-title { font-size:13px; color:#3a5a3a; letter-spacing:0.15em; margin-bottom:16px; }
.modal input, .modal textarea { width:100%; border:0.5px solid rgba(120,180,120,0.3); background:rgba(255,255,255,0.6); border-radius:10px; padding:10px 12px; font-size:13px; color:#3a5a3a; font-family:inherit; outline:none; margin-bottom:10px; }
.modal textarea { resize:none; line-height:1.8; }
.modal-footer { display:flex; gap:8px; justify-content:flex-end; margin-top:4px; }
.modal-cancel { background:transparent; border:0.5px solid rgba(120,180,120,0.3); border-radius:16px; padding:6px 16px; font-size:11px; color:#8aaa8a; cursor:pointer; font-family:inherit; }
.modal-submit { background:rgba(140,200,120,0.4); border:0.5px solid rgba(120,180,120,0.4); border-radius:16px; padding:6px 16px; font-size:11px; color:#4a7a4a; cursor:pointer; font-family:inherit; }
</style>
</head>
<body>
<div class="page">
  <canvas class="rain" id="rain"></canvas>
  <div class="inner">
    <div class="header">
      <a class="back-btn" href="home.html">← 第一个家</a>
      <div class="page-title">时间线</div>
    </div>
    <div id="tlContent"><div class="loading">…</div></div>
  </div>
</div>

<div class="add-fab" onclick="openModal()">+</div>

<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title">记一件事</div>
    <input type="text" id="inputDate" placeholder="日期，如 2026-03-04">
    <input type="text" id="inputTitle" placeholder="标题">
    <textarea id="inputContent" placeholder="一段话（可留空）" rows="3"></textarea>
    <div class="modal-footer">
      <button class="modal-cancel" onclick="closeModal()">取消</button>
      <button class="modal-submit" onclick="submitItem()">留下</button>
    </div>
  </div>
</div>

<script>
var API = 'https://lune404.top/api/timeline';

async function load() {
  try {
    var res = await fetch(API + '/list');
    var data = await res.json();
    render(data.data || []);
  } catch(e) {
    document.getElementById('tlContent').innerHTML = '<div class="loading">加载失败</div>';
  }
}

function render(items) {
  if (!items.length) {
    document.getElementById('tlContent').innerHTML = '<div class="loading">还没有记录</div>';
    return;
  }
  var html = '<div class="timeline">'
    + items.map(function(t) {
        return '<div class="tl-item">'
          + '<div class="tl-dot"></div>'
          + '<div class="tl-date">' + esc(t.date) + '</div>'
          + '<div class="tl-card">'
          + '<button class="tl-del" onclick="deleteItem(\'' + t.id + '\')">删</button>'
          + '<div class="tl-title">' + esc(t.title) + '</div>'
          + (t.content ? '<div class="tl-content">' + esc(t.content) + '</div>' : '')
          + '</div>'
          + '</div>';
      }).join('')
    + '</div>';
  document.getElementById('tlContent').innerHTML = html;
}

async function deleteItem(id) {
  try {
    await fetch(API + '/delete/' + id, {method:'DELETE'});
    load();
  } catch(e) {}
}

function openModal() {
  document.getElementById('modalOverlay').classList.add('show');
  setTimeout(function(){ document.getElementById('inputDate').focus(); }, 100);
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('modalOverlay')) return;
  document.getElementById('modalOverlay').classList.remove('show');
  document.getElementById('inputDate').value = '';
  document.getElementById('inputTitle').value = '';
  document.getElementById('inputContent').value = '';
}

async function submitItem() {
  var date = document.getElementById('inputDate').value.trim();
  var title = document.getElementById('inputTitle').value.trim();
  var content = document.getElementById('inputContent').value.trim();
  if (!date || !title) return;
  try {
    var res = await fetch(API + '/add', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({date:date, title:title, content:content})
    });
    var data = await res.json();
    if (data.ok) {
      closeModal();
      load();
    }
  } catch(e) {}
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

var cv=document.getElementById('rain'),cx=cv.getContext('2d');
function resize(){cv.width=window.innerWidth;cv.height=window.innerHeight;}
resize();window.addEventListener('resize',resize);
var dr=Array.from({length:45},function(){return{x:Math.random()*cv.width,y:Math.random()*cv.height,s:0.8+Math.random()*1.3,l:9+Math.random()*13,o:0.1+Math.random()*0.25};});
function draw(){cx.clearRect(0,0,cv.width,cv.height);dr.forEach(function(d){cx.strokeStyle='#4a8a4a';cx.lineWidth=0.5;cx.globalAlpha=d.o*(0.5+(d.y/cv.height)*0.5);cx.beginPath();cx.moveTo(d.x,d.y);cx.lineTo(d.x-0.8,d.y+d.l);cx.stroke();d.y+=d.s;if(d.y>cv.height){d.y=-d.l;d.x=Math.random()*cv.width;}});cx.globalAlpha=1;requestAnimationFrame(draw);}
draw();

load();
</script>
</body>
</html>
