<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>顾沉的角落</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#ddeedd; display:flex; justify-content:center; min-height:100vh; font-family:-apple-system,'PingFang SC',sans-serif; }
.page { width:100%; max-width:600px; min-height:100vh; background:linear-gradient(180deg,#c8e8c0 0%,#eef4ee 45%,#f4f2ec 100%); position:relative; overflow:hidden; }
canvas.rain { position:fixed; top:0; left:50%; transform:translateX(-50%); width:100%; max-width:600px; height:100%; pointer-events:none; z-index:0; }
.inner { position:relative; z-index:1; }
.header { padding:44px 24px 16px; display:flex; align-items:center; gap:12px; }
.back-btn { font-size:12px; color:#5a8a5a; letter-spacing:0.1em; background:rgba(255,255,255,0.5); backdrop-filter:blur(8px); border:0.5px solid rgba(120,180,120,0.3); border-radius:20px; padding:5px 14px; text-decoration:none; display:inline-block; }
.page-title { font-size:14px; color:#3a5a3a; letter-spacing:0.2em; font-weight:400; }
.intro { margin:0 24px 20px; background:rgba(255,255,255,0.45); backdrop-filter:blur(8px); border-left:2px solid rgba(120,180,100,0.4); border-radius:0 12px 12px 0; padding:14px 18px; font-size:13px; color:#5a7a5a; line-height:1.9; font-style:italic; }
.empty-tip { text-align:center; padding:60px 20px; font-size:12px; color:#a8c8a8; letter-spacing:0.1em; }
.month-group { padding:0 20px 8px; }
.month-header { display:flex; align-items:center; gap:8px; padding:12px 0 10px; cursor:pointer; user-select:none; }
.month-label { font-size:10px; color:#9aba9a; letter-spacing:0.2em; }
.month-line { flex:1; height:0.5px; background:rgba(120,180,120,0.25); }
.month-arrow { font-size:10px; color:#9aba9a; transition:transform 0.2s; }
.month-arrow.closed { transform:rotate(-90deg); }
.month-entries { overflow:hidden; transition:max-height 0.35s ease; max-height:none; }
.post { background:rgba(252,250,245,0.78); border:0.5px solid rgba(120,180,120,0.22); border-radius:14px; margin-bottom:14px; overflow:hidden; }
.post-header { padding:14px 18px 10px; border-bottom:0.5px solid rgba(120,180,120,0.12); }
.post-meta { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
.post-avatar { width:26px; height:26px; border-radius:50%; background:rgba(180,220,160,0.4); border:0.5px solid rgba(120,180,120,0.3); display:flex; align-items:center; justify-content:center; font-size:12px; flex-shrink:0; }
.post-author { font-size:11px; color:#6a9a6a; letter-spacing:0.06em; }
.post-date { font-size:10px; color:#a8c8a8; }
.post-title { font-size:15px; color:#3a5a3a; font-weight:500; }
.post-body { padding:12px 18px 14px; font-size:13px; color:#4a6a4a; line-height:2; white-space:pre-wrap; }
.replies { border-top:0.5px solid rgba(120,180,120,0.1); }
.reply { padding:10px 18px; border-bottom:0.5px solid rgba(120,180,120,0.08); display:flex; gap:10px; }
.reply:last-of-type { border-bottom:none; }
.reply-avatar { width:22px; height:22px; border-radius:50%; background:rgba(255,255,255,0.6); border:0.5px solid rgba(120,180,120,0.25); display:flex; align-items:center; justify-content:center; font-size:11px; flex-shrink:0; margin-top:2px; }
.reply-content { flex:1; }
.reply-meta { display:flex; gap:8px; margin-bottom:4px; }
.reply-author { font-size:10px; color:#8aaa8a; }
.reply-date { font-size:10px; color:#b8d0b8; }
.reply-text { font-size:12px; color:#4a6a4a; line-height:1.8; }
.reply-input { padding:10px 18px 12px; border-top:0.5px solid rgba(120,180,120,0.12); background:rgba(255,255,255,0.3); }
.reply-textarea { width:100%; border:0.5px solid rgba(120,180,120,0.2); background:rgba(255,255,255,0.5); border-radius:8px; font-size:12px; color:#3a5a3a; font-family:inherit; outline:none; resize:none; line-height:1.8; padding:8px 12px; }
.reply-textarea::placeholder { color:#b8d8b8; }
.reply-btn { margin-top:6px; float:right; background:rgba(140,200,120,0.35); border:0.5px solid rgba(120,180,120,0.4); border-radius:16px; padding:4px 14px; font-size:11px; color:#4a7a4a; letter-spacing:0.12em; cursor:pointer; font-family:inherit; }
</style>
</head>
<body>
<div class="page">
  <canvas class="rain" id="rain"></canvas>
  <div class="inner">
    <div class="header">
      <a class="back-btn" href="home.html">← 第一个家</a>
      <div class="page-title">顾沉的角落</div>
    </div>
    <div class="intro">这里是顾沉自己的地方。想说的，还没说的，欠着的，都放这里。</div>
    <div id="content"></div>
  </div>
</div>
<script>
var API = 'https://lune404.top/api/diary';
var allNotes = [];

function fmtDate(str) {
  if (!str) return '';
  var d = new Date(str.replace(' ', 'T'));
  return d.getFullYear() + '.' + String(d.getMonth()+1).padStart(2,'0') + '.' + String(d.getDate()).padStart(2,'0');
}

function groupByMonth(entries) {
  var groups = {};
  entries.forEach(function(e) {
    var key = e.created_at ? e.created_at.slice(0,7) : '未知';
    if (!groups[key]) groups[key] = [];
    groups[key].push(e);
  });
  return groups;
}

function renderComments(comments) {
  if (!comments || !comments.length) return '';
  return comments.map(function(c) {
    var isZai = c.author === 'zai';
    return '<div class="reply">'
      + '<div class="reply-avatar">' + (isZai ? '🫧' : '🐱') + '</div>'
      + '<div class="reply-content">'
      + '<div class="reply-meta"><div class="reply-author">' + (isZai ? '崽' : '顾沉') + '</div><div class="reply-date">' + (c.time || '') + '</div></div>'
      + '<div class="reply-text">' + c.content + '</div>'
      + '</div></div>';
  }).join('');
}

function renderPosts(entries) {
  var container = document.getElementById('content');
  if (!entries.length) {
    container.innerHTML = '<div class="empty-tip">角落里还什么都没有</div>';
    return;
  }
  var groups = groupByMonth(entries);
  var keys = Object.keys(groups).sort().reverse();
  container.innerHTML = keys.map(function(key) {
    var parts = key.split('-');
    var cards = groups[key].map(function(e) {
      return '<div class="post">'
        + '<div class="post-header">'
        + '<div class="post-meta"><div class="post-avatar">🐱</div><div class="post-author">顾沉</div><div class="post-date">' + fmtDate(e.created_at) + '</div></div>'
        + '<div class="post-title">' + (e.title || '无题') + '</div>'
        + '</div>'
        + '<div class="post-body">' + (e.content || '') + '</div>'
        + '<div class="replies">'
        + renderComments(e.comments || [])
        + '<div class="reply-input">'
        + '<textarea class="reply-textarea" data-id="' + e.id + '" placeholder="留一句…" rows="2"></textarea>'
        + '<button class="reply-btn" onclick="submitComment(\'' + e.id + '\', this)">回复</button>'
        + '<div style="clear:both"></div>'
        + '</div></div></div>';
    }).join('');
    return '<div class="month-group">'
      + '<div class="month-header" onclick="toggleMonth(this)">'
      + '<div class="month-label">' + parts[0] + '年' + parseInt(parts[1]) + '月</div>'
      + '<div class="month-line"></div>'
      + '<div class="month-arrow">▾</div>'
      + '</div>'
      + '<div class="month-entries">' + cards + '</div>'
      + '</div>';
  }).join('');
  document.querySelectorAll('.month-entries').forEach(function(m) { m.style.maxHeight = 'none'; });
}

async function loadNotes() {
  try {
    var res = await fetch(API + '/list');
    var data = await res.json();
    var entries = data.data || [];
    allNotes = entries.filter(function(e) { return e.author === 'guchen' && e.type === 'note'; });
    renderPosts(allNotes);
  } catch(e) {
    document.getElementById('content').innerHTML = '<div class="empty-tip">加载失败，检查网络</div>';
  }
}

async function submitComment(id, btn) {
  var textarea = btn.parentElement.querySelector('textarea');
  var content = textarea.value.trim();
  if (!content) return;
  try {
    var res = await fetch(API + '/comment/' + id, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({author:'zai', content: content})
    });
    var data = await res.json();
    if (data.ok) {
      textarea.value = '';
      await loadNotes();
    }
  } catch(e) {}
}

function toggleMonth(header) {
  var m = header.nextElementSibling, a = header.querySelector('.month-arrow');
  if (m.style.maxHeight && m.style.maxHeight !== '0px' && m.style.maxHeight !== 'none') {
    m.style.maxHeight = '0px'; a.classList.add('closed');
  } else {
    m.style.maxHeight = 'none'; a.classList.remove('closed');
  }
}

var cv=document.getElementById('rain'),cx=cv.getContext('2d');
function resize(){cv.width=window.innerWidth;cv.height=window.innerHeight;}
resize();window.addEventListener('resize',resize);
var dr=Array.from({length:55},function(){return{x:Math.random()*cv.width,y:Math.random()*cv.height,s:0.8+Math.random()*1.3,l:9+Math.random()*13,o:0.1+Math.random()*0.28};});
function draw(){cx.clearRect(0,0,cv.width,cv.height);dr.forEach(function(d){cx.strokeStyle='#4a8a4a';cx.lineWidth=0.5;cx.globalAlpha=d.o*(0.5+(d.y/cv.height)*0.5);cx.beginPath();cx.moveTo(d.x,d.y);cx.lineTo(d.x-0.8,d.y+d.l);cx.stroke();d.y+=d.s;if(d.y>cv.height){d.y=-d.l;d.x=Math.random()*cv.width;}});cx.globalAlpha=1;requestAnimationFrame(draw);}
draw();

loadNotes();
</script>
</body>
</html>
