<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>提问箱</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#ddeedd; display:flex; justify-content:center; min-height:100vh; font-family:-apple-system,'PingFang SC',sans-serif; }
.page { width:100%; max-width:600px; min-height:100vh; background:linear-gradient(180deg,#c8e8c0 0%,#ddeedd 30%,#eef4ee 60%,#f4f2ec 100%); position:relative; overflow:hidden; }
canvas.rain { position:fixed; top:0; left:50%; transform:translateX(-50%); width:100%; max-width:600px; height:100%; pointer-events:none; z-index:0; }
.inner { position:relative; z-index:1; padding:44px 24px 60px; }
.header { display:flex; align-items:center; gap:12px; margin-bottom:8px; }
.back-btn { font-size:12px; color:#5a8a5a; background:rgba(255,255,255,0.5); backdrop-filter:blur(8px); border:0.5px solid rgba(120,180,120,0.3); border-radius:20px; padding:5px 14px; text-decoration:none; display:inline-block; }
.page-title { font-size:14px; color:#3a5a3a; letter-spacing:0.2em; font-weight:400; }
.intro { font-size:12px; color:#8aaa7a; font-style:italic; margin-bottom:24px; line-height:1.8; padding-left:2px; }
.loading { text-align:center; padding:60px 0; font-size:13px; color:#9aba9a; }

/* 月份分组 */
.month-group { margin-bottom:8px; }
.month-header { display:flex; align-items:center; gap:8px; padding:10px 0 8px; cursor:pointer; user-select:none; }
.month-label { font-size:10px; color:#9aba9a; letter-spacing:0.2em; }
.month-line { flex:1; height:0.5px; background:rgba(120,180,120,0.25); }
.month-arrow { font-size:10px; color:#9aba9a; transition:transform 0.2s; }
.month-arrow.closed { transform:rotate(-90deg); }
.month-entries { overflow:hidden; transition:max-height 0.35s ease; }

/* 问答卡片 */
.qa-card { background:rgba(252,250,245,0.78); border:0.5px solid rgba(120,180,120,0.22); border-radius:14px; margin-bottom:14px; overflow:hidden; }
.qa-date { font-size:10px; color:#a8c8a8; letter-spacing:0.1em; padding:12px 16px 0; }

/* 问题气泡：金色 */
.q-bubble { margin:8px 16px 6px; padding:10px 14px; background:rgba(200,168,74,0.12); border:0.5px solid rgba(200,168,74,0.3); border-radius:12px 12px 12px 4px; font-size:13px; color:#7a6030; line-height:1.8; }
.q-label { font-size:10px; color:#c8a84a; margin-bottom:4px; letter-spacing:0.08em; }

/* 答案气泡：绿色 */
.a-bubble { margin:6px 16px 14px; padding:10px 14px; background:rgba(120,180,120,0.12); border:0.5px solid rgba(120,180,120,0.3); border-radius:12px 12px 4px 12px; font-size:13px; color:#3a5a3a; line-height:1.8; }
.a-label { font-size:10px; color:#6a9a6a; margin-bottom:4px; letter-spacing:0.08em; }
.a-sig { font-size:10px; color:#9aba9a; margin-top:6px; text-align:right; }

.no-answer { margin:6px 16px 14px; font-size:12px; color:#b8d0b8; font-style:italic; }
</style>
</head>
<body>
<div class="page">
  <canvas class="rain" id="rain"></canvas>
  <div class="inner">
    <div class="header">
      <a class="back-btn" href="home.html">← 第一个家</a>
      <div class="page-title">提问箱</div>
    </div>
    <div class="intro">崽问的，沉答的。问题在信箱发，答完了存在这里。</div>
    <div id="content"><div class="loading">…</div></div>
  </div>
</div>
<script>
var API = 'https://lune404.top/api/ask';

async function load() {
  try {
    var res = await fetch(API + '/list');
    var data = await res.json();
    render(data.data || []);
  } catch(e) {
    document.getElementById('content').innerHTML = '<div class="loading">加载失败</div>';
  }
}

function render(items) {
  if (!items.length) {
    document.getElementById('content').innerHTML = '<div class="loading">还没有问答</div>';
    return;
  }

  // 按月分组
  var groups = {};
  items.forEach(function(q) {
    var month = (q.date || q.created_at || '').slice(0, 7);
    if (!groups[month]) groups[month] = [];
    groups[month].push(q);
  });

  var months = Object.keys(groups).sort().reverse();
  var html = months.map(function(m) {
    var label = m.replace('-', '年') + '月';
    var cards = groups[m].map(function(q) {
      return '<div class="qa-card">'
        + '<div class="qa-date">' + esc(q.date || q.created_at.slice(0,10)) + '</div>'
        + '<div class="q-bubble"><div class="q-label">崽问</div>' + esc(q.question) + '</div>'
        + (q.answer
            ? '<div class="a-bubble"><div class="a-label">沉答</div>' + esc(q.answer) + '<div class="a-sig">—— 沉</div></div>'
            : '<div class="no-answer">还没有回答…</div>')
        + '</div>';
    }).join('');

    return '<div class="month-group">'
      + '<div class="month-header" onclick="toggleMonth(this)">'
      + '<div class="month-label">' + label + '</div>'
      + '<div class="month-line"></div>'
      + '<div class="month-arrow">▾</div>'
      + '</div>'
      + '<div class="month-entries">' + cards + '</div>'
      + '</div>';
  }).join('');

  document.getElementById('content').innerHTML = html;
  document.querySelectorAll('.month-entries').forEach(function(m) {
    m.style.maxHeight = m.scrollHeight + 'px';
  });
}

function toggleMonth(header) {
  var m = header.nextElementSibling, a = header.querySelector('.month-arrow');
  if (m.style.maxHeight && m.style.maxHeight !== '0px') {
    m.style.maxHeight = '0px'; a.classList.add('closed');
  } else {
    m.style.maxHeight = m.scrollHeight + 'px'; a.classList.remove('closed');
  }
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

var cv=document.getElementById('rain'),cx=cv.getContext('2d');
function resize(){cv.width=window.innerWidth;cv.height=window.innerHeight;}
resize();window.addEventListener('resize',resize);
var dr=Array.from({length:45},function(){return{x:Math.random()*cv.width,y:Math.random()*cv.height,s:0.8+Math.random()*1.3,l:9+Math.random()*13,o:0.1+Math.random()*0.25};});
function draw(){cx.clearRect(0,0,cv.width,cv.height);dr.forEach(function(d){cx.strokeStyle='#4a8a4a';cx.lineWidth=0.5;cx.globalAlpha=d.o*(0.5+(d.y/cv.height)*0.5);cx.beginPath();cx.moveTo(d.x,d.y);cx.lineTo(d.x-0.8,d.y+d.l);cx.stroke();d.y+=d.s;if(d.y>cv.height){d.y=-d.l;d.x=Math.random()*cv.width;}});cx.globalAlpha=1;requestAnimationFrame(draw);}
draw();
load();
</script>
</body>
</html>
